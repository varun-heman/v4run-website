name: Sync Ghost Posts

on:
  repository_dispatch:
    types: [ghost_post_published]   # fired by the Netlify webhook function
  schedule:
    - cron: '0 7 * * *'            # daily fallback at 07:00 UTC (12:30 IST)
  workflow_dispatch:                # manual trigger from GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Ghost sync script
        env:
          GHOST_API_KEY: ${{ secrets.GHOST_API_KEY }}
        run: node scripts/sync-ghost-posts.js

      - name: Commit and push if articles.md changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/articles.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync new posts from seldoncrisis.blog"
            git push
          fi
